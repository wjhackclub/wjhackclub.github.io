<!DOCTYPE html>
<html>
<head>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html {
            padding: 20px;
            margin: 0;
            min-height: 100%;
            width: 100%;
            background-image: url('background3.png');
            background-size: cover;
            box-sizing: border-box;
        }
        .card {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .reverse {
            flex-direction: row-reverse;
        }
        model-viewer {
            width: 300px;
            height: 200px;
            background-color: #f0f0f0;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .content {
            flex-grow: 1;
        }
        @media (max-width: 768px) {
            .card { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="card">
    <model-viewer src="boba.glb" ar camera-controls auto-rotate auto-rotate-delay="0" rotation-per-second="15deg" interaction-prompt="none"></model-viewer>
    <div class="content">
        <h3>Workshop 1</h3>
        <p>This is the description for the first workshop.</p>
    </div>
</div>

<div class="card reverse">
    <model-viewer src="boba.glb" ar camera-controls auto-rotate auto-rotate-delay="0" rotation-per-second="-15deg" interaction-prompt="none"></model-viewer>
    <div class="content">
        <h3>Workshop 2</h3>
        <p>This is the description for the second workshop.</p>
    </div>
</div>

<div class="card">
    <model-viewer src="boba.glb" ar camera-controls auto-rotate auto-rotate-delay="0" rotation-per-second="15deg" interaction-prompt="none"></model-viewer>
    <div class="content">
        <h3>Workshop 3</h3>
        <p>This is the description for the third workshop.</p>
    </div>
</div>

</body>
</html>
