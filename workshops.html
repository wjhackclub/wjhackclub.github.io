<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
    <style>
        html {
            padding: 30px 20px;
            margin: 0;
            min-height: 100%;
            width: 100%;
            background-image: url('background3.png');
            background-size: cover;
            background-attachment: fixed;
            box-sizing: border-box;
            font-family: 'Rubik', sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            width: 100%;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'JetBrains Mono', monospace;
            margin-top: 0;
            color: #4a3470;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #ffffff;
            color: #111111;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 24px;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }
        .back-btn:hover {
            background-color: #fafafa;
            transform: translateX(-2px);
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.05);
            width: 100%;
            display: flex;
            align-items: center;
            gap: 35px;
            margin-bottom: 20px;
            box-sizing: border-box;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .reverse {
            flex-direction: row-reverse;
        }
        model-viewer {
            width: 38%;
            height: 260px;
            background-color: #f8f9fa;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .content {
            flex-grow: 1;
        }
        .content h3 {
            font-size: 24px;
            margin-bottom: 12px;
        }
        .content p {
            font-size: 17px;
            line-height: 1.5;
            color: #4c6082;
            margin: 0;
        }
        @media (max-width: 768px) {
            html {
                padding: 20px 15px;
            }
            .card {
                flex-direction: column;
                text-align: center;
                padding: 25px 20px;
                gap: 20px;
            }
            .reverse {
                flex-direction: column;
            }
            model-viewer {
                width: 100%;
                height: 240px;
            }
            .content h3 {
                font-size: 22px;
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <a href="index.html" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back
    </a>

    <div class="card">
        <model-viewer src="boba.glb" ar camera-controls auto-rotate auto-rotate-delay="0" rotation-per-second="15deg" interaction-prompt="none">
            <div slot="progress-bar"></div>
        </model-viewer>
        <div class="content">
            <h3>Boba Drop</h3>
            <p>Build your own website earn a 5$ grant for boba.</p>
        </div>
    </div>

    <div class="card reverse">
        <model-viewer src="boba.glb" ar camera-controls auto-rotate auto-rotate-delay="0" rotation-per-second="-15deg" interaction-prompt="none">
            <div slot="progress-bar"></div>
        </model-viewer>
        <div class="content">
            <h3>Fuse Ring</h3>
            <p>Design a keyring, get your keyring and a clip for your backpack.</p>
        </div>
    </div>

    <div class="card">
        <model-viewer src="boba.glb" ar camera-controls auto-rotate auto-rotate-delay="0" rotation-per-second="15deg" interaction-prompt="none">
            <div slot="progress-bar"></div>
        </model-viewer>
        <div class="content">
            <h3>Hacker Card</h3>
            <p>Learn pcb software by designing and manufacturing a business card that can transmit nfc.</p>
        </div>
    </div>

</div>

</body>
</html>
