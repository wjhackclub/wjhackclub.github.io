<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
    <style>
        html {
            padding: 20px;
            margin: 0;
            min-height: 100%;
            width: 100%;
            background-image: url('background3.png');
            background-size: cover;
            box-sizing: border-box;
            font-family: 'Rubik', sans-serif;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'JetBrains Mono', monospace;
            margin-top: 0;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #ffffff;
            color: #111111;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 24px;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }
        .back-btn:hover {
            background-color: #fafafa;
            transform: translateX(-2px);
        }
        .card {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .reverse {
            flex-direction: row-reverse;
        }
        model-viewer {
            width: 300px;
            height: 200px;
            background-color: #f0f0f0;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .content {
            flex-grow: 1;
        }
        @media (max-width: 768px) {
            .card { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<a href="index.html" class="back-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Back
</a>

<div class="card">
    <model-viewer src="boba.glb" ar camera-controls auto-rotate auto-rotate-delay="0" rotation-per-second="15deg" interaction-prompt="none">
        <div slot="progress-bar"></div>
    </model-viewer>
    <div class="content">
        <h3>Workshop 1</h3>
        <p>This is the description for the first workshop.</p>
    </div>
</div>

<div class="card reverse">
    <model-viewer src="boba.glb" ar camera-controls auto-rotate auto-rotate-delay="0" rotation-per-second="-15deg" interaction-prompt="none">
        <div slot="progress-bar"></div>
    </model-viewer>
    <div class="content">
        <h3>Workshop 2</h3>
        <p>This is the description for the second workshop.</p>
    </div>
</div>

<div class="card">
    <model-viewer src="boba.glb" ar camera-controls auto-rotate auto-rotate-delay="0" rotation-per-second="15deg" interaction-prompt="none">
        <div slot="progress-bar"></div>
    </model-viewer>
    <div class="content">
        <h3>Workshop 3</h3>
        <p>This is the description for the third workshop.</p>
    </div>
</div>

</body>
</html>
